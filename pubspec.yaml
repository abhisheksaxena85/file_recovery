name: file_recovery
description: "Advanced deleted file recovery application – scan, identify, and restore deleted files."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  provider: ^6.1.2
  intl: ^0.19.0
  file_picker: ^8.1.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  share_plus: ^10.0.2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
